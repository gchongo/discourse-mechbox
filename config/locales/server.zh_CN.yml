    categories:
      general: "通用"
      tolerance: "公差与 GD&T"
      transmission: "传动"
      fastening: "紧固件"
      structural: "结构"
      materials: "材料"
      design: "设计链"

    tools:
      unit_converter:
        name: "单位换算"
        description: "在支持的工程单位之间换算。"
      rss_calculation:
        name: "RSS 叠加"
        description: "公差 RSS 平方和开方叠加。"
      gear_ratio:
        name: "齿轮比"
        description: "根据齿数计算转速比。"
      bolt_clamp_load:
        name: "螺栓预紧力"
        description: "支持简化、完整（VDI 2230）与专业（刚度/嵌入/热膨胀）三档预紧力计算。"
      thread:
        name: "螺纹强度"
        description: "拉应力 / 剪应力 / 旋合长度校核，支持简化、完整与专业（VDI）模式。"
      key:
        name: "平键连接"
        description: "GB/T 1096 挤压与剪切校核，支持简化、完整与专业（多键/幅值）模式。"
      bolt_group:
        name: "螺栓组"
        description: "偏心剪力与弯矩下的螺栓组载荷分配，支持简化、矢量分解与专业（抗滑/撬力）模式。"
      weld:
        name: "焊缝强度"
        description: "角焊缝与对接焊缝强度估算，支持简化、三标准对照与专业（合成应力/HAZ）模式。"
      spring:
        name: "弹簧设计"
        description: "圆柱螺旋压缩弹簧刚度与切应力校核，支持简化、完整与专业（疲劳）模式。"
      clutch:
        name: "离合器"
        description: "摩擦离合器传递扭矩与压紧力，支持简化、完整（有效半径/比压）与专业（离心/热衰减）模式。"
      belt:
        name: "皮带传动"
        description: "开口皮带长度、传动比与 Euler 张力估算，支持简化、完整（几何包角/带速）与专业（工况系数/寿命）模式。"
      chain:
        name: "链传动"
        description: "滚子链节距、链长、传动比与张力估算，支持简化、完整（链速/张力校核）与专业（多排/寿命）模式。"
      tol_convert:
        name: "公差转换"
        description: "按分布系数 K 在公差 T 与标准差 σ 之间换算，支持简化、完整（多分布）与专业（自定义 K）模式。"
      sigma_analysis:
        name: "西格玛分析"
        description: "过程能力 C / Cpk、合格率与短程西格玛水平，支持简化、完整（门槛校核）与专业（样本估计/长期修正）模式。"
      fit:
        name: "ISO 286 配合"
        description: "轴孔公差带极限尺寸与间隙/过盈，支持简化、完整（品质指数）与专业（温差热修正）模式。"
      distribution_chart:
        name: "分布曲线"
        description: "按公差与分布类型计算 PDF 峰密度、σ 与采样点（先出数，图表后续），支持简化、完整与专业（规格合格率）模式。"
      thermal_expansion:
        name: "热膨胀"
        description: "线膨胀 ΔL 与配合间隙/过盈温变，支持简化（线膨胀）、完整（配合变化）与专业（α(T) 修正、装配/工况两段）模式。"
      interference_fit:
        name: "过盈配合"
        description: "压配合接触压力、压装力与传递扭矩（Lame），支持简化、完整（空心轴/环向应力门限）与专业（温差修正过盈）模式。"
      bearing:
        name: "轴承寿命"
        description: "ISO 281 当量动载荷与 L10/Lnm 寿命，支持简化、完整（X/Y 查表/可靠性）与专业（温度系数/极限转速）模式。"
      shaft:
        name: "轴强度"
        description: "实心/空心轴扭转与弯扭合成强度，支持简化、完整（空心/转角门限）与专业（应力集中峰值；疲劳未放行）模式。"
      gear:
        name: "齿轮强度"
        description: "直齿轮弯曲与接触强度；简化 Lewis、完整 ISO 6336 简化系数、专业 ISO/AGMA 对照。"
      fatigue:
        name: "疲劳寿命"
        description: "Basquin S-N 寿命与 Miner 累积损伤；简化单级估算、完整目标寿命+谱、专业 Goodman/Se′。"
      beam:
        name: "梁挠度"
        description: "Euler-Bernoulli 梁弯曲应力与挠度前置估算；支持简支/悬臂与常用截面，本服务端版本不输出疲劳放行结论。"
      structural:
        name: "结构/流体"
        description: "管路 Darcy-Weisbach 压降、薄板弹性屈曲与一阶模态频率前置校核，所有输入显式区分工程单位。"
      sheet_metal:
        name: "钣金展开"
        description: "使用 K 因子折弯补偿或折弯扣除估算展开长度；长度单位为 mm，折弯角单位为度。"
      cylinder:
        name: "液压/气动缸"
        description: "按 MPa-mm-N 单位计算缸面积、推力、流量速度、载荷余量与活塞杆屈曲校核。"
      o_ring:
        name: "O 型圈密封"
        description: "Parker / ISO 3601 简化沟槽校核：压缩率、填充率、挤出间隙与材料温度。"
      manufacturing:
        name: "制造工艺"
        description: "机加工余量（直径段查表）与铸造拔模角估算；长度单位 mm，拔模角单位 °。"
      gdt_position:
        name: "GD&T 位置度"
        description: "由 X/Y 实测偏差计算位置度直径，可选公差校核。"

    home:
